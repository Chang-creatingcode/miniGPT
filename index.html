    dFfo = this.ln2.bwd(dFfo);
    for (let i = 0; i < N; i++) for (let j = 0; j < D; j++) dR1[i][j] += dFfo[i][j];
    let dX = cp(dR1), dAttn = dR1;
    dAttn = this.ln1.bwd(dAttn);
    dAttn = this.attn.bwd(dAttn);
    for (let i = 0; i < N; i++) for (let j = 0; j < D; j++) dX[i][j] += dAttn[i][j];
    return dX;
  }
  zg() { this.ln1.zg(); this.attn.zg(); this.ln2.zg(); this.ff1.zg(); this.ff2.zg(); }
}

// ============================================================
//   MINI GPT MODEL
// ============================================================
class MiniGPT {
  constructor(vs, dm, nh, nl, ff, msl) {
    this.vs = vs; this.dm = dm; this.nh = nh; this.nl = nl; this.ff = ff; this.msl = msl;
    this.tokEmb = new Embedding(vs, dm);
    this.posEmb = new Embedding(msl, dm);
    this.blocks = []; for (let i = 0; i < nl; i++) this.blocks.push(new TransformerBlock(dm, nh, ff));
    this.lnF = new LayerNorm(dm);
    this.lmH = new Linear(dm, vs);
  }

  _cmask(S) { const m = zr(S, S); for (let i = 0; i < S; i++) for (let j = 0; j <= i; j++) m[i][j] = 1; return m; }

  fwd(tokens) {
    const S = tokens.length;
    const te = this.tokEmb.fwd(tokens);
    const pi = []; for (let i = 0; i < S; i++) pi.push(i);
    const pe = this.posEmb.fwd(pi);
    let x = zr(S, this.dm);
    for (let i = 0; i < S; i++) for (let j = 0; j < this.dm; j++) x[i][j] = te[i][j] + pe[i][j];
    const mask = this._cmask(S);
    for (const blk of this.blocks) x = blk.fwd(x, mask);
    x = this.lnF.fwd(x);
    return this.lmH.fwd(x);
  }

  bwd(dlogits) {
    let dx = this.lmH.bwd(dlogits);
    dx = this.lnF.bwd(dx);
    for (let i = this.blocks.length - 1; i >= 0; i--) dx = this.blocks[i].bwd(dx);
    this.tokEmb.bwd(dx); this.posEmb.bwd(dx);
    return dx;
  }

  zg() {
    this.tokEmb.zg(); this.posEmb.zg();
    for (const blk of this.blocks) blk.zg();
    this.lnF.zg(); this.lmH.zg();
  }

  countParams() {
    let n = 0;
    const cM = (m) => { n += m.length * m[0].length; };
    const cV = (v) => { n += v.length; };
    cM(this.tokEmb.w); cM(this.posEmb.w);
    for (const blk of this.blocks) {
      cM(blk.attn.Wq.W); cM(blk.attn.Wk.W); cM(blk.attn.Wv.W); cM(blk.attn.Wo.W);
      cM(blk.ff1.W); cM(blk.ff2.W);
      cV(blk.ln1.g); cV(blk.ln1.b); cV(blk.ln2.g); cV(blk.ln2.b);
    }
    cV(this.lnF.g); cV(this.lnF.b); cM(this.lmH.W); cV(this.lmH.b);
    return n;
  }

  generate(promptTokens, maxNew, temp, tokenizer) {
    let tokens = promptTokens.slice();
    const newlineIdx = tokenizer.c2i['\n'] !== undefined ? tokenizer.c2i['\n'] : -1;

    for (let step = 0; step < maxNew; step++) {
      if (tokens.length > this.msl) tokens = tokens.slice(tokens.length - this.msl);
      const logits = this.fwd(tokens);
      const lastLogits = logits[logits.length - 1];

      let nextToken;
      if (temp <= 0.001) {
        let best = 0, bestVal = lastLogits[0];
        for (let j = 1; j < lastLogits.length; j++) {
          if (lastLogits[j] > bestVal) { bestVal = lastLogits[j]; best = j; }
        }
        nextToken = best;
      } else {
        const invT = 1 / temp;
        let mx = -Infinity;
        for (let j = 0; j < lastLogits.length; j++) {
          if (lastLogits[j] * invT > mx) mx = lastLogits[j] * invT;
        }
        let sum = 0;
        const probs = new Float64Array(lastLogits.length);
        for (let j = 0; j < lastLogits.length; j++) {
          probs[j] = Math.exp(lastLogits[j] * invT - mx);
          sum += probs[j];
        }
        for (let j = 0; j < lastLogits.length; j++) probs[j] /= sum;
        const r = Math.random();
        let cum = 0;
        nextToken = lastLogits.length - 1;
        for (let j = 0; j < lastLogits.length; j++) {
          cum += probs[j]; if (r < cum) { nextToken = j; break; }
        }
      }

      tokens.push(nextToken);

      // Stop conditions:
      // 1. Single newline after generating some content
      if (nextToken === newlineIdx && tokens.length - promptTokens.length > 3) break;
      // 2. Repetition: 4+ same chars in a row
      if (step >= 4) {
        const last4 = tokens.slice(tokens.length - 4);
        let allSame = true;
        for (let k = 1; k < 4; k++) { if (last4[k] !== last4[0]) { allSame = false; break; } }
        if (allSame) break;
      }
    }
    return tokens.slice(promptTokens.length);
  }
}

// ============================================================
//   TRAINING CORPUS — 极简设计，确保模型能真正收敛
//   核心思路：只有10个QA对，回复极短（2-8字），每个重复50次
//   字符级模型需要loss<0.3才能生成有意义输出，数据必须极其简单
// ============================================================
const TRAINING_CORPUS = (() => {
  const qa = [
    ["你好", "你好！"],
    ["嗨", "嗨！"],
    ["你是谁", "我是AI助手。"],
    ["谢谢", "不客气！"],
    ["再见", "再见！"],
    ["早", "早上好！"],
    ["晚安", "晚安！"],
    ["什么是AI", "AI是人工智能。"],
    ["什么是Python", "Python是编程语言。"],
    ["讲个笑话", "鸡为什么过马路？要到对面去！"],
  ];
  let text = '';
  // 每个QA重复50次 —— 确保模型在训练数据上充分过拟合
  for (let repeat = 0; repeat < 50; repeat++) {
    for (const [q, a] of qa) {
      text += `User: ${q}\nAssistant: ${a}\n\n`;
    }
  }
  return text;
})();

// ============================================================
//   ADAM OPTIMIZER
// ============================================================
function initAdam() {
  // Flatten all parameters
  const params = collectParams();
  let total = 0;
  for (const p of params) total += p.length;
  adamM = new Float64Array(total);
  adamV = new Float64Array(total);
  adamT = 0;
}

function flatMatrix(m) {
  // m is Array of Float64Array → flatten to single Float64Array
  const rows = m.length, cols = m[0].length;
  const out = new Float64Array(rows * cols);
  for (let i = 0; i < rows; i++)
    for (let j = 0; j < cols; j++)
      out[i * cols + j] = m[i][j];
  return out;
}

function collectParams() {
  const p = [];
  for (let i = 0; i < model.tokEmb.w.length; i++) p.push(model.tokEmb.w[i]);
  for (let i = 0; i < model.posEmb.w.length; i++) p.push(model.posEmb.w[i]);
  for (const blk of model.blocks) {
    p.push(flatMatrix(blk.attn.Wq.W)); p.push(flatMatrix(blk.attn.Wk.W));
    p.push(flatMatrix(blk.attn.Wv.W)); p.push(flatMatrix(blk.attn.Wo.W));
    p.push(flatMatrix(blk.ff1.W)); p.push(flatMatrix(blk.ff2.W));
    p.push(blk.ln1.g); p.push(blk.ln1.b);
    p.push(blk.ln2.g); p.push(blk.ln2.b);
  }
  p.push(model.lnF.g); p.push(model.lnF.b);
  p.push(flatMatrix(model.lmH.W)); p.push(model.lmH.b);
  return p;
}

// ============================================================
//   WEB WORKER PARALLEL TRAINING
// ============================================================

// Worker code as string — compiled into Blob URL
const WORKER_CODE = `
// ============================================================
//   WebGPU Accelerated Matrix Operations
// ============================================================
let gpuDevice = null;
let gpuReady = false;

// Try to init WebGPU
(async function() {
  try {
    if (typeof navigator !== 'undefined' && navigator.gpu) {
      const adapter = await navigator.gpu.requestAdapter();
      if (adapter) {
        gpuDevice = await adapter.requestDevice();
        gpuReady = true;
      }
    }
  } catch(e) { gpuReady = false; }
})();

// WGSL shader for matmul: C = A @ B  (with optional transposes)
const MATMUL_SHADER = \`
@group(0) @binding(0) var<storage, read> A: array<f32>;
@group(0) @binding(1) var<storage, read> B: array<f32>;
@group(0) @binding(2) var<storage, read_write> C: array<f32>;
struct Params { R: u32, C: u32, K: u32, transA: u32, transB: u32 };
@group(0) @binding(3) var<uniform> params: Params;
@compute @workgroup_size(8, 8)
fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
  let row = gid.x; let col = gid.y;
  if (row >= params.R || col >= params.K) { return; }
  var sum: f32 = 0.0;
  for (var j: u32 = 0u; j < params.C; j = j + 1u) {
    let aIdx = params.transA > 0u ? j * params.R + row : row * params.C + j;
    let bIdx = params.transB > 0u ? col * params.C + j : j * params.K + col;
    sum = sum + A[aIdx] * B[bIdx];
  }
  C[row * params.K + col] = sum;
}
\`;

function gpuMatmul(a, b, transA, transB) {
  // a: R×C (or C×R if transA), b: C×K (or K×C if transB), result: R×K
  const R = transA ? a[0].length : a.length;
  const Ca = transA ? a.length : a[0].length;
  const K = transB ? b.length : b[0].length;
  const Cb = transB ? b[0].length : b.length;
  if (Ca !== Cb) throw new Error('GPU matmul dimension mismatch');
  const C = Ca;

  // Flatten to Float32Array
  const aFlat = new Float32Array(R * C);
  const bFlat = new Float32Array(C * K);
  for (let i = 0; i < R; i++) for (let j = 0; j < C; j++) aFlat[i * C + j] = transA ? a[j][i] : a[i][j];
  for (let i = 0; i < C; i++) for (let j = 0; j < K; j++) bFlat[i * K + j] = transB ? b[j][i] : b[i][j];

  const aBuf = gpuDevice.createBuffer({size: aFlat.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST, mappedAtCreation: true});
  new Float32Array(aBuf.getMappedRange()).set(aFlat); aBuf.unmap();
  const bBuf = gpuDevice.createBuffer({size: bFlat.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST, mappedAtCreation: true});
  new Float32Array(bBuf.getMappedRange()).set(bFlat); bBuf.unmap();
  const cBuf = gpuDevice.createBuffer({size: R * K * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC});
  const paramsBuf = gpuDevice.createBuffer({size: 20, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST, mappedAtCreation: true});
  new Uint32Array(paramsBuf.getMappedRange()).set([R, C, K, transA ? 1 : 0, transB ? 1 : 0]); paramsBuf.unmap();
  const readBuf = gpuDevice.createBuffer({size: R * K * 4, usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ});

  if (!gpuDevice._matmulPipeline) {
    const shader = gpuDevice.createShaderModule({code: MATMUL_SHADER});
    gpuDevice._matmulPipeline = gpuDevice.createComputePipeline({layout: 'auto', compute: {module: shader, entryPoint: 'main'}});
  }
  const bindGroup = gpuDevice.createBindGroup({layout: gpuDevice._matmulPipeline.getBindGroupLayout(0), entries: [
    {binding: 0, resource: {buffer: aBuf}}, {binding: 1, resource: {buffer: bBuf}},
    {binding: 2, resource: {buffer: cBuf}}, {binding: 3, resource: {buffer: paramsBuf}}
  ]});

  const encoder = gpuDevice.createCommandEncoder();
  const pass = encoder.beginComputePass();
  pass.setPipeline(gpuDevice._matmulPipeline);
  pass.setBindGroup(0, bindGroup);
  pass.dispatchWorkgroups(Math.ceil(R / 8), Math.ceil(K / 8));
  pass.end();
  encoder.copyBufferToBuffer(cBuf, 0, readBuf, 0, R * K * 4);
  gpuDevice.queue.submit([encoder.finish()]);

  return {readBuf, R, K};
}

function gpuMatmulRead(promise) {
  return new Promise((resolve) => {
    promise.readBuf.mapAsync(GPUMapMode.READ).then(() => {
      const gpuResult = new Float32Array(promise.readBuf.getMappedRange());
      const R = promise.R, K = promise.K;
      const out = new Array(R);
      for (let i = 0; i < R; i++) {
        out[i] = new Float64Array(K);
        for (let j = 0; j < K; j++) out[i][j] = gpuResult[i * K + j];
      }
      promise.readBuf.unmap();
      resolve(out);
    });
  });
}

// Matrix utils (same as main thread)
function zr(r,c){const m=new Array(r);for(let i=0;i<r;i++)m[i]=new Float64Array(c);return m}
function z1(n){return new Float64Array(n)}
function cp(m){const R=m.length,C=m[0].length,o=new Array(R);for(let i=0;i<R;i++){o[i]=new Float64Array(C);for(let j=0;j<C;j++)o[i][j]=m[i][j]}return o}

// CPU fallback matmul
function mmCPU(a,b){const R=a.length,C=a[0].length,K=b[0].length,o=zr(R,K);for(let i=0;i<R;i++)for(let k=0;k<K;k++){let s=0;for(let j=0;j<C;j++)s+=a[i][j]*b[j][k];o[i][k]=s}return o}
function mmTBCPU(a,b){const R=a.length,C=a[0].length,K=b.length,o=zr(R,K);for(let i=0;i<R;i++)for(let k=0;k<K;k++){let s=0;for(let j=0;j<C;j++)s+=a[i][j]*b[k][j];o[i][k]=s}return o}
function mmTACPU(a,b){const C=a.length,R=a[0].length,K=b[0].length,o=zr(R,K);for(let i=0;i<R;i++)for(let k=0;k<K;k++){let s=0;for(let j=0;j<C;j++)s+=a[j][i]*b[j][k];o[i][k]=s}return o}

// GPU-accelerated matmul with synchronous fallback
function mm(a,b){if(gpuReady){const p=gpuMatmul(a,b,0,0);return gpuMatmulRead(p)}return mmCPU(a,b)}
function mmTB(a,b){if(gpuReady){const p=gpuMatmul(a,b,0,1);return gpuMatmulRead(p)}return mmTBCPU(a,b)}
function mmTA(a,b){if(gpuReady){const p=gpuMatmul(a,b,1,0);return gpuMatmulRead(p)}return mmTACPU(a,b)}
function addM(a,b){const R=a.length,C=a[0].length,o=zr(R,C);if(b.length===C&&typeof b[0]==='number'){for(let i=0;i<R;i++)for(let j=0;j<C;j++)o[i][j]=a[i][j]+b[j]}else{for(let i=0;i<R;i++)for(let j=0;j<C;j++)o[i][j]=a[i][j]+b[i][j]}return o}
function sm(logits){const R=logits.length,C=logits[0].length,o=zr(R,C);for(let i=0;i<R;i++){let mx=-Infinity;for(let j=0;j<C;j++)if(logits[i][j]>mx)mx=logits[i][j];let s=0;for(let j=0;j<C;j++){o[i][j]=Math.exp(logits[i][j]-mx);s+=o[i][j]}for(let j=0;j<C;j++)o[i][j]/=s}return o}
function smB(dA,aW){const N=dA.length,C=dA[0].length,o=zr(N,C);for(let i=0;i<N;i++){let dot=0;for(let j=0;j<C;j++)dot+=aW[i][j]*dA[i][j];for(let j=0;j<C;j++)o[i][j]=aW[i][j]*(dA[i][j]-dot)}return o}
function rm(r,c,s){const m=new Array(r);for(let i=0;i<r;i++){m[i]=new Float64Array(c);for(let j=0;j<c;j++)m[i][j]=0}return m}

// Layer classes (train-only, no generate) — all async for GPU
class Linear {
  constructor(inD,outD,bias,W,b){this.inD=inD;this.outD=outD;this.W=W;this.b=b;this.bias=bias;this.dW=zr(inD,outD);this.db=bias?z1(outD):null;this.cx=null}
  async fwd(x){this.cx=cp(x);let o=await mm(x,this.W);if(this.b)for(let i=0;i<o.length;i++)for(let j=0;j<o[0].length;j++)o[i][j]+=this.b[j];return o}
  async bwd(dout){const x=this.cx,N=x.length,id=this.inD,od=this.outD;for(let i=0;i<id;i++)for(let j=0;j<od;j++)this.dW[i][j]=0;for(let n=0;n<N;n++)for(let i=0;i<id;i++)for(let j=0;j<od;j++)this.dW[i][j]+=x[n][i]*dout[n][j];if(this.db){for(let j=0;j<od;j++)this.db[j]=0;for(let n=0;n<N;n++)for(let j=0;j<od;j++)this.db[j]+=dout[n][j]}return mmTB(dout,this.W)}
}
class Embedding {
  constructor(vs,dim,w){this.w=w;this.dw=zr(vs,dim);this.ci=null}
  fwd(ix){this.ci=ix.slice();const N=ix.length,D=this.w[0].length,o=zr(N,D);for(let i=0;i<N;i++)for(let j=0;j<D;j++)o[i][j]=this.w[ix[i]][j];return o}
  bwd(dout){for(let i=0;i<this.dw.length;i++)for(let j=0;j<this.dw[0].length;j++)this.dw[i][j]=0;const ix=this.ci,N=ix.length,D=dout[0].length;for(let i=0;i<N;i++)for(let j=0;j<D;j++)this.dw[ix[i]][j]+=dout[i][j];return null}
}
class LayerNorm {
  constructor(dim,g,b){this.g=g;this.b=b;this.dg=z1(dim);this.db=z1(dim);this.eps=1e-5;this.cache=null}
  fwd(x){const N=x.length,D=x[0].length,o=zr(N,D),mu=new Float64Array(N),is=new Float64Array(N),xh=zr(N,D);for(let i=0;i<N;i++){let m=0;for(let j=0;j<D;j++)m+=x[i][j];m/=D;mu[i]=m;let v=0;for(let j=0;j<D;j++)v+=(x[i][j]-m)*(x[i][j]-m);v/=D;is[i]=1/Math.sqrt(v+this.eps);for(let j=0;j<D;j++){xh[i][j]=(x[i][j]-m)*is[i];o[i][j]=this.g[j]*xh[i][j]+this.b[j]}}this.cache={x:cp(x),mu,is,xh};return o}
  bwd(dout){const{x,mu,is,xh}=this.cache,N=x.length,D=x[0].length,dx=zr(N,D);for(let j=0;j<D;j++){this.dg[j]=0;this.db[j]=0}for(let i=0;i<N;i++)for(let j=0;j<D;j++){this.dg[j]+=dout[i][j]*xh[i][j];this.db[j]+=dout[i][j]}for(let i=0;i<N;i++){const dxh=new Float64Array(D);let s1=0,s2=0;for(let j=0;j<D;j++){dxh[j]=dout[i][j]*this.g[j];s1+=dxh[j];s2+=dxh[j]*xh[i][j]}const f=1/D;for(let j=0;j<D;j++)dx[i][j]=is[i]*(dxh[j]-f*s1-f*xh[i][j]*s2)}return dx}
}
class MultiHeadAttention {
  constructor(dm,nh,Wq,Wk,Wv,Wo){this.dm=dm;this.nh=nh;this.dk=dm/nh;this.sc=1/Math.sqrt(this.dk);this.Wq=new Linear(dm,dm,false,Wq,null);this.Wk=new Linear(dm,dm,false,Wk,null);this.Wv=new Linear(dm,dm,false,Wv,null);this.Wo=new Linear(dm,dm,false,Wo,null);this.cache=null}

onmessage = async function(e) {
  const {type, weights, batchTokens, seqLen, hp, vocab} = e.data;
  if (type === 'train') {
    const w = new Float64Array(weights);
    let idx = 0;
    function readMat(r,c){const m=new Array(r);for(let i=0;i<r;i++){m[i]=new Float64Array(c);for(let j=0;j<c;j++)m[i][j]=w[idx++]}return m}
    function readVec(n){const v=new Float64Array(n);for(let i=0;i<n;i++)v[i]=w[idx++];return v}
    const vs=vocab, dm=hp.dModel, nh=hp.nHeads, nl=hp.nLayers, ff=hp.ffDim, msl=hp.maxSeqLen;
    const tokW=readMat(vs,dm);const posW=readMat(msl,dm);
    const blocksData=[];
    for(let l=0;l<nl;l++){
      blocksData.push({Wq:readMat(dm,dm),Wk:readMat(dm,dm),Wv:readMat(dm,dm),Wo:readMat(dm,dm),f1W:readMat(dm,ff),f2W:readMat(ff,dm),ln1g:readVec(dm),ln1b:readVec(dm),ln2g:readVec(dm),ln2b:readVec(dm)});
    }
    const lnFg=readVec(dm),lnFb=readVec(dm),lmHW=readMat(dm,vs),lmHb=readVec(vs);
    const model = new TrainModel(vs,dm,nh,nl,ff,msl,tokW,posW,blocksData,lnFg,lnFb,lmHW,lmHb);
    let totalLoss=0;
    for(let b=0;b<batchTokens.length;b++){

      const logits=await model.fwd(inputTokens);totalLoss+=ceLoss(logits,targetTokens);
      const dlogits=ceBwd(logits,targetTokens);await model.bwd(dlogits);
    }
    const grads=model.collectGradsFlat();
    let gTotal=0;for(const g of grads)gTotal+=g.length;
    const flatGrads=new Float64Array(gTotal);let gi=0;for(const g of grads){for(let i=0;i<g.length;i++)flatGrads[gi++]=g[i]}

    const msg={loss:totalLoss/batchTokens.length,grads:flatGrads.buffer};

let workers = [];
let numWorkers = 0;

function initWorkers() {
  for (const w of workers) w.terminate();
  workers = [];
  const input = document.getElementById('workerCountInput');
  const raw = parseInt(input.value) || 12;
  numWorkers = Math.max(1, Math.min(32, raw));
  input.value = numWorkers; // Clamp display
  try {
    const blob = new Blob([WORKER_CODE], {type: 'application/javascript'});
    const url = URL.createObjectURL(blob);
    for (let i = 0; i < numWorkers; i++) {
      workers.push(new Worker(url));
    }
    addLog(`已启动 ${numWorkers} 个并行Worker (手动设置·GPU由Worker自行检测)`, 'li');
  } catch(e) {
    addLog(`Worker初始化失败: ${e.message}`, 'lw');
    numWorkers = workers.length;
    if (numWorkers === 0) {
      addLog('致命: 无法创建任何Worker，训练将不可用', 'lw');
    }
  }
  updateModelInfo();
}

function serializeModelWeights() {
  // Flatten all model weights into a single Float64Array (same order as TrainModel expects)
  const parts = [];
  function pushMat(m) { for (let i = 0; i < m.length; i++) for (let j = 0; j < m[0].length; j++) parts.push(m[i][j]); }
  function pushVec(v) { for (let i = 0; i < v.length; i++) parts.push(v[i]); }
  pushMat(model.tokEmb.w); pushMat(model.posEmb.w);
  for (const blk of model.blocks) {
    pushMat(blk.attn.Wq.W); pushMat(blk.attn.Wk.W); pushMat(blk.attn.Wv.W); pushMat(blk.attn.Wo.W);
    pushMat(blk.ff1.W); pushMat(blk.ff2.W);
    pushVec(blk.ln1.g); pushVec(blk.ln1.b); pushVec(blk.ln2.g); pushVec(blk.ln2.b);
  }
  pushVec(model.lnF.g); pushVec(model.lnF.b); pushMat(model.lmH.W); pushVec(model.lmH.b);
  return new Float64Array(parts);
}

async function trainStepParallel(data) {
  // Sample random batch
  const batchTokens = [];
  for (let b = 0; b < HP.batchSize; b++) {
    const start = Math.floor(Math.random() * Math.max(1, data.length - HP.seqLen - 1));
    batchTokens.push(data.slice(start, start + HP.seqLen + 1));
  }

  // Serialize model weights
  const flatWeights = serializeModelWeights();

  // Split batch across workers
  const perWorker = Math.ceil(HP.batchSize / numWorkers);
  const promises = [];
  let totalLoss = 0;

  for (let w = 0; w < numWorkers; w++) {
    const start = w * perWorker;
    const end = Math.min(start + perWorker, HP.batchSize);
    if (start >= end) continue;
    const workerBatch = batchTokens.slice(start, end);
    const weightsCopy = flatWeights.buffer.slice(0); // Each worker gets its own copy

    const p = new Promise((resolve, reject) => {
      workers[w].onmessage = (e) => {
        resolve({loss: e.data.loss * (end - start), grads: new Float64Array(e.data.grads)});
      };
      workers[w].onerror = reject;
    });

    workers[w].postMessage({
      type: 'train',
      weights: weightsCopy,
      batchTokens: workerBatch,
      seqLen: HP.seqLen,
      hp: {dModel: HP.dModel, nHeads: HP.nHeads, nLayers: HP.nLayers, ffDim: HP.ffDim, maxSeqLen: HP.maxSeqLen},
      vocab: tokenizer.vs
    }, [weightsCopy]); // Transfer ownership

    promises.push(p);
  }

  const results = await Promise.all(promises);

  // Aggregate gradients
  const gradSize = results[0].grads.length;
  const aggGrads = new Float64Array(gradSize);
  for (const r of results) {
    totalLoss += r.loss;
    for (let i = 0; i < gradSize; i++) aggGrads[i] += r.grads[i];
  }

  // Clip gradients
  let norm = 0;
  for (let i = 0; i < aggGrads.length; i++) norm += aggGrads[i] * aggGrads[i];
  norm = Math.sqrt(norm);
  if (norm > HP.gradClip) {
    const scale = HP.gradClip / norm;
    for (let i = 0; i < aggGrads.length; i++) aggGrads[i] *= scale;
  }

  // Apply Adam
  applyAdamFlat(aggGrads);

  return totalLoss / HP.batchSize;
}

function applyAdamFlat(flatGrads) {
  const params = collectParams();
  let flatParams = new Float64Array(adamM.length);
  let idx = 0;
  for (const p of params) { for (let i = 0; i < p.length; i++) flatParams[idx++] = p[i]; }

  adamT++;
  const lr = HP.lr * Math.sqrt(1 - Math.pow(adamBeta2, adamT)) / (1 - Math.pow(adamBeta1, adamT));

  for (let i = 0; i < flatGrads.length; i++) {
    adamM[i] = adamBeta1 * adamM[i] + (1 - adamBeta1) * flatGrads[i];
    adamV[i] = adamBeta2 * adamV[i] + (1 - adamBeta2) * flatGrads[i] * flatGrads[i];
    flatParams[i] -= lr * adamM[i] / (Math.sqrt(adamV[i]) + adamEps);
  }

  // Write back
  idx = 0;
  for (const p of params) { for (let i = 0; i < p.length; i++) p[i] = flatParams[idx++]; }
}

function addLog(msg, cls = '') {
  const area = document.getElementById('logArea');
  const div = document.createElement('div');
  div.className = cls;
  div.textContent = msg;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  // Keep max 50 lines
  while (area.children.length > 50) area.removeChild(area.firstChild);
}

function updateProgress(step, total, loss) {
  const pct = Math.min(100, (step / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent =
    `步骤 ${step}/${total} · 损失 ${loss.toFixed(4)} · ${(pct).toFixed(0)}%`;
}

async function startTraining() {
  if (trainingRunning) return;
  trainingRunning = true;
  trainingStop = false;

  document.getElementById('btnTrain').disabled = true;
  document.getElementById('btnStop').disabled = false;
  document.getElementById('btnReset').disabled = true;
  document.getElementById('chatInput').disabled = true;
  document.getElementById('btnSend').disabled = true;

  if (!model) initModel();
  if (!adamM) initAdam();
  if (workers.length === 0) initWorkers();

  const data = tokenizer.enc(TRAINING_CORPUS);
  const stepsPerEpoch = Math.max(1, Math.floor(data.length / (HP.batchSize * HP.seqLen)));
  const totalStepsPlan = stepsPerEpoch * HP.totalEpochs;

  addLog(`=== 语料: ${TRAINING_CORPUS.length}字 · ${numWorkers} Workers · ${HP.totalEpochs}轮 ===`, 'li');
  addLog(`模型: d=${HP.dModel} L=${HP.nLayers} 头=${HP.nHeads} FF=${HP.ffDim} 参数: ${model.countParams().toLocaleString()}`, 'li');

  const startTime = Date.now();
  let smoothLoss = 0;
  let lastLogStep = 0;
  let lastEpochLogged = 0;

  HP.lr = 0.005; // Reset LR at start

  for (let step = 0; step < totalStepsPlan; step++) {
    if (trainingStop) break;
    const loss = await trainStepParallel(data);
    totalSteps++;
    smoothLoss = smoothLoss * 0.95 + loss * 0.05;

    const currentEpoch = Math.floor(step / stepsPerEpoch) + 1;

    // LR scheduler: halve every 10 epochs
    if (currentEpoch > lastEpochLogged && currentEpoch % 10 === 0) {
      HP.lr *= 0.5;
      addLog(`学习率降至 ${HP.lr.toFixed(5)}`, 'li');
    }

    // Yield to UI
    if (step % 10 === 0 || step === totalStepsPlan - 1) {
      updateProgress(step + 1, totalStepsPlan, smoothLoss);
      if (step - lastLogStep >= 100 || step === totalStepsPlan - 1 || step === 0) {
        const elapsed = (Date.now() - startTime) / 1000;
        addLog(`${currentEpoch}/${HP.totalEpochs}轮 · 步${step+1} · loss ${smoothLoss.toFixed(4)} · ${elapsed.toFixed(1)}s`, 'li');
        lastLogStep = step;
      }
      await new Promise(r => setTimeout(r, 0));
    }

    // Validation: every epoch, test "你好"
    if (currentEpoch > lastEpochLogged && step % stepsPerEpoch === 0) {
      lastEpochLogged = currentEpoch;
      try {
        const testPrompt = 'User: 你好\nAssistant:';
        const testTokens = tokenizer.enc(testPrompt);
        const gen = model.generate(testTokens, 20, 0, tokenizer);
        const genText = tokenizer.dec(gen).replace(/[\s\n\r]+/g, '').substring(0, 20);
        addLog(`验证(你好): "${genText}"`, 'li');
      } catch(e) {}
      await new Promise(r => setTimeout(r, 0));
    }
  }

  const elapsed = (Date.now() - startTime) / 1000;
  if (trainingStop) {
    addLog(`训练已停止 · ${totalSteps}步 · loss ${smoothLoss.toFixed(4)}`, 'lw');
  } else {
    addLog(`=== 训练完成! ${totalSteps}步 ${elapsed.toFixed(1)}s loss ${smoothLoss.toFixed(4)} ===`, 'ls');
  }

  trainingRunning = false;
  document.getElementById('btnTrain').disabled = false;
  document.getElementById('btnStop').disabled = true;
  document.getElementById('btnReset').disabled = false;
  document.getElementById('chatInput').disabled = false;
  document.getElementById('btnSend').disabled = false;
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = `完成 · ${totalSteps}步 · loss ${smoothLoss.toFixed(4)}`;

  addLog('模型已就绪，可以开始对话!', 'ls');
}

function stopTraining() {
  trainingStop = true;
  addLog('正在停止训练...', 'lw');
}

function resetModel() {
  if (trainingRunning) return;
  // Terminate workers
  for (const w of workers) { w.terminate(); }
  workers = []; numWorkers = 0;
  initModel();
  adamM = null; adamV = null; adamT = 0;
  totalSteps = 0; currentLoss = 0;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressText').textContent = '就绪，等待训练';
  document.getElementById('chatInput').disabled = true;
  document.getElementById('btnSend').disabled = true;
  document.getElementById('chatMsgs').innerHTML = `<div class="msg ast"><div class="role">AI 助手</div><div>模型已重置。点击"开始训练"重新训练。</div></div>`;
  addLog('模型已重置 · Workers已释放', 'li');
  updateModelInfo();
}

function addMessage(role, text) {
  const msgs = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'user' : 'ast');
  const roleLabel = role === 'user' ? '你' : 'AI 助手';
  div.innerHTML = `<div class="role">${roleLabel}</div><div>${escapeHtml(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

async function sendMessage() {
  if (!model || trainingRunning) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.disabled = true;
  document.getElementById('btnSend').disabled = true;

  addMessage('user', text);

  // Build prompt matching training format exactly
  const prompt = `User: ${text}\nAssistant:`;
  let promptTokens = tokenizer.enc(prompt);

  // Truncate if too long
  if (promptTokens.length > HP.maxSeqLen - 30) {
    promptTokens = promptTokens.slice(promptTokens.length - (HP.maxSeqLen - 30));
  }

  // Generate
  const msgDiv = addMessage('assistant', '...');
  const contentDiv = msgDiv.querySelector('div:last-child');

  try {
    // Greedy decoding (temp=0) for deterministic output
    const generatedTokens = model.generate(promptTokens, 30, 0, tokenizer);
    const response = tokenizer.dec(generatedTokens);
    let cleanResponse = response
      .replace(/^[\s\n\r]+/, '')
      .replace(/[\s\n\r]+$/, '');
    const userIdx = cleanResponse.indexOf('User:');
    if (userIdx > 0) cleanResponse = cleanResponse.substring(0, userIdx).trim();
    if (!cleanResponse || cleanResponse.length < 1) {
      cleanResponse = '(模型尚未学会回答，请继续训练)';
    }
    contentDiv.textContent = cleanResponse;
  } catch (e) {
    contentDiv.textContent = '(生成出错: ' + e.message + ')';
    addLog('生成错误: ' + e.message, 'lw');
  }

  input.disabled = false;
  document.getElementById('btnSend').disabled = false;
  input.focus();
}

// ============================================================
//   INIT
// ============================================================
initModel();
addLog('模型已初始化 · 参数: ' + model.countParams().toLocaleString(), 'li');
addLog('语料: ' + TRAINING_CORPUS.length + '字 · 词表: ' + tokenizer.vs + ' · 模型参数: ' + model.countParams().toLocaleString(), 'li');
addLog('10个QA对×50次重复 · 点击"开始训练"启动30轮并行训练', 'li');
</script>
